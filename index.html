<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotesRadarVisualization</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 0 0 48px;
    }

    .header {
      background: #0f3460;
      padding: 18px 24px 14px;
      text-align: center;
    }
    .header h1 {
      color: #a0d8ef;
      font-size: 22px;
      font-weight: 700;
    }
    .header p {
      color: #a0aec0;
      font-size: 12px;
      margin-top: 4px;
    }

    .upload-section {
      max-width: 480px;
      margin: 32px auto 0;
      padding: 0 20px;
    }

    .upload-card {
      background: #16213e;
      border: 2px dashed #0f3460;
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-card.drag-over {
      border-color: #e94560;
      background: #1e2a4a;
    }
    .upload-card.loaded {
      border-color: #38a169;
      border-style: solid;
    }

    .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-card h3 { font-size: 13px; color: #a0d8ef; margin-bottom: 6px; }
    .upload-card p  { font-size: 12px; color: #a0aec0; margin-bottom: 14px; }

    .upload-card label {
      display: inline-block;
      padding: 8px 20px;
      background: #e94560;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .upload-card label:hover { background: #ff6b81; }
    .upload-card input[type="file"] { display: none; }

    .file-name {
      margin-top: 10px;
      font-size: 12px;
      color: #68d391;
      min-height: 18px;
    }

    .radar-status {
      max-width: 480px;
      margin: 16px auto 0;
      padding: 0 20px;
    }

    .radar-status-inner {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 12px;
      color: #a0aec0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .radar-status-inner.ok    { border-color: #38a169; color: #68d391; }
    .radar-status-inner.error { border-color: #e94560; color: #fc8181; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #a0aec0;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-section {
      max-width: 960px;
      margin: 32px auto 0;
      padding: 0 20px;
    }

    .view-tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .view-tab-btn {
      padding: 7px 18px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #a0aec0;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-tab-btn:hover { background: #1e2a4a; color: #e2e8f0; }
    .view-tab-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
    .clear-selection-btn {
      margin-left: auto;
      padding: 7px 14px;
      background: transparent;
      border: 1px solid #4a5568;
      border-radius: 6px;
      color: #718096;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .clear-selection-btn:hover { background: #1e2a4a; color: #e2e8f0; border-color: #a0aec0; }

    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 0;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 8px 20px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      color: #a0aec0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.03em;
    }
    .tab-btn:hover { background: #1e2a4a; color: #e2e8f0; }
    .tab-btn.active {
      background: #0f3460;
      color: #a0d8ef;
      border-color: #0f3460;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 8px 14px;
      background: #0f3460;
      font-size: 13px;
      color: #a0aec0;
    }
    .info-bar .formula {
      font-size: 12px;
      color: #a0d8ef;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #16213e;
      font-size: 14px;
    }

    thead tr { background: #0f3460; }
    thead th {
      padding: 12px 14px;
      text-align: center;
      color: #a0d8ef;
      font-weight: 600;
      white-space: nowrap;
    }
    thead th.left { text-align: left; }

    tbody tr {
      border-bottom: 1px solid #0f3460;
      transition: background 0.15s;
      cursor: pointer;
    }
    tbody tr:nth-child(odd)  { background: #16213e; }
    tbody tr:nth-child(even) { background: #1a2444; }
    tbody tr:hover { background: #1e2a4a !important; }
    tbody tr.out-of-top10:nth-child(odd)  { background: #111827; }
    tbody tr.out-of-top10:nth-child(even) { background: #131b2e; }
    tbody tr.out-of-top10 td { color: #6b7280; }
    tbody tr.out-of-top10:hover { background: #1a2233 !important; }
    tbody tr.selected { background: #0e3a6e !important; box-shadow: inset 3px 0 0 #60a5fa; }

    tbody td {
      padding: 10px 14px;
      color: #e2e8f0;
      white-space: nowrap;
    }
    tbody td.title {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    tbody td.center { text-align: center; }
    tbody td.right  { text-align: right; }
    tbody td.radar  { text-align: right; font-weight: 700; color: #a0d8ef; }

    .rank-1 td.rank { color: #ffd700; font-weight: 700; }
    .rank-2 td.rank { color: #c0c0c0; font-weight: 700; }
    .rank-3 td.rank { color: #cd7f32; font-weight: 700; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-B { background: #2d5a27; color: #68d391; }
    .badge-N { background: #1e3a6e; color: #63b3ed; }
    .badge-H { background: #5a2d2d; color: #fc8181; }
    .badge-A { background: #5a4a1e; color: #f6ad55; }
    .badge-L { background: #3d2d5a; color: #b794f4; }

    .dj-info  { font-size: 11px; font-weight: 600; }
    .dj-MAX   { color: #ffffff; text-shadow: 0 0 6px #fff; }
    .dj-MAX-  { color: #ffe4b5; }
    .dj-AAA   { color: #ffd700; }
    .dj-AA    { color: #a0d8ef; }
    .dj-A    { color: #b794f4; }
    .dj-B    { color: #68d391; }
    .dj-C    { color: #63b3ed; }
    .dj-D    { color: #f6e05e; }
    .dj-E    { color: #f6ad55; }
    .dj-F    { color: #a0aec0; }

    .hidden { display: none; }

    .error-msg {
      color: #fc8181;
      background: #2d1515;
      border: 1px solid #e94560;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>NotesRadarVisualization</h1>
    <p>beatmania IIDX SP ノーツレーダー × スコアデータ 上位20件</p>
  </div>

  <div class="upload-section">
    <div class="upload-card" id="card-score">
      <div class="upload-icon">🎮</div>
      <h3>スコアCSV</h3>
      <p>e-amusement から出力したSPスコアデータ</p>
      <label for="input-score">ファイルを選択</label>
      <input type="file" id="input-score" accept=".csv">
      <div class="file-name" id="name-score"></div>
    </div>
  </div>

  <div class="radar-status">
    <div class="radar-status-inner" id="radar-status">
      <span class="spinner" id="radar-spinner"></span>
      <span id="radar-status-text">ノーツレーダーデータを読み込み中…</span>
    </div>
  </div>

  <div id="error-area" class="result-section hidden">
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="result-section hidden" id="result-section">
    <div class="view-tab-bar">
      <button class="view-tab-btn active" id="view-tab-played"   onclick="switchView('played')">プレイ済み上位</button>
      <button class="view-tab-btn"        id="view-tab-unplayed" onclick="switchView('unplayed')">未プレイ上位</button>
      <button class="clear-selection-btn" id="clear-selection-btn">選択全解除</button>
    </div>
    <div class="tab-bar" id="tab-bar"></div>
    <div class="info-bar">
      <span id="info-text"></span>
      <strong id="avg-value" style="font-size:15px;color:#a0d8ef;"></strong>
    </div>
    <div class="table-wrapper">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const SHEET_ID   = '1If1uzZZY5zL0ZFXC394JsnggNX0fvkBmiGNpBSZvGOM';
    const BASE_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=`;
    const RADAR_TYPES = ['NOTES', 'CHORD', 'PEAK', 'CHARGE', 'SCRATCH', 'SOF-LAN'];

    // タイトル照合例外: スコアCSVのタイトル → レーダーCSVで追加で試すタイトル候補
    // 通常の strict/loose マッチングで一致しない場合のフォールバック
    const TITLE_LOOKUP_EXTRA = new Map([
      ['fffff', ['ƒƒƒƒƒ']],   // レーダーCSVは ƒ (U+0192) を使用
      ['0.59',  ["'.59", '.59']],  // スコアCSVは"0.59"、レーダーCSVは"'.59"
    ]);

    // 表示名上書き: スコアCSVのタイトル → 正式な表示名
    const TITLE_DISPLAY_OVERRIDE = new Map([
      ['0.59', '.59'],
    ]);
    function displayTitle(rawTitle) {
      return TITLE_DISPLAY_OVERRIDE.get(rawTitle) ?? rawTitle;
    }

    // 未プレイ一覧から除外するタイトル（rawTitle の完全一致）
    const UNPLAYED_EXCLUDE = new Set([
      'デモーニッシュ',
      '俺ら東京さ行ぐだ',
      'Sweet Clapper',
      'Please Welcome Mr.C',
      'anthracene',
    ]);

    const DIFF_MAP = [
      { full: 'BEGINNER',    abbr: 'B' },
      { full: 'NORMAL',      abbr: 'N' },
      { full: 'HYPER',       abbr: 'H' },
      { full: 'ANOTHER',     abbr: 'A' },
      { full: 'LEGGENDARIA', abbr: 'L' },
    ];

    // radarMapByType: { NOTES: Map, CHORD: Map, ... }
    let radarMapByType  = {};
    let resultsByType   = {};
    let unplayedByType  = {};
    let scoreRows       = null;
    let activeTab       = 'NOTES';
    let viewMode        = 'played'; // 'played' | 'unplayed'

    // ── タブ生成 ─────────────────────────────
    const tabBar = document.getElementById('tab-bar');
    RADAR_TYPES.forEach(type => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (type === 'NOTES' ? ' active' : '');
      btn.textContent = type;
      btn.addEventListener('click', () => switchTab(type));
      btn.id = `tab-${type}`;
      tabBar.appendChild(btn);
    });

    function switchTab(type) {
      activeTab = type;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${type}`).classList.add('active');
      renderCurrentTab();
    }

    // ── レーダーデータ取得 ────────────────────
    function setRadarStatus(state, text) {
      const el = document.getElementById('radar-status');
      const sp = document.getElementById('radar-spinner');
      const tx = document.getElementById('radar-status-text');
      el.className = 'radar-status-inner' + (state ? ' ' + state : '');
      sp.style.display = state === 'loading' ? '' : 'none';
      tx.textContent = text;
    }

    async function fetchRadarData() {
      setRadarStatus('loading', 'ノーツレーダーデータを読み込み中…');
      try {
        const results = await Promise.all(
          RADAR_TYPES.map(type =>
            fetch(BASE_URL + encodeURIComponent(type))
              .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
              .then(text => ({ type, text }))
          )
        );

        for (const { type, text } of results) {
          const { rows } = parseCSV(text);
          const strictMap = new Map();
          const looseMap  = new Map();
          for (const row of rows) {
            if ((row['SP/DP'] || '').trim() !== 'SP') continue;
            const rawTitle = (row['タイトル'] || '').trim();
            const diff     = (row['難易度']   || '').trim();
            const notes    = parseInt(row['ノーツ数']);
            const max      = parseFloat(row['MAX']);
            if (!rawTitle || !diff || isNaN(notes) || isNaN(max)) continue;
            const entry = { notes, max, rawTitle };
            strictMap.set(`${titleKeyStrict(rawTitle)}::${diff}`, entry);
            looseMap.set(`${titleKeyLoose(rawTitle)}::${diff}`, entry);
          }
          radarMapByType[type] = { strict: strictMap, loose: looseMap };
        }

        const total = Object.values(radarMapByType).reduce((s, m) => s + m.strict.size, 0);
        setRadarStatus('ok', `✔ ノーツレーダーデータ読み込み完了 (全6種 ${total.toLocaleString()} 件)`);
        tryCalculate();
      } catch (e) {
        setRadarStatus('error', '✖ 取得失敗: ' + e.message);
      }
    }

    // ── スコアファイル読み込み ────────────────
    function setupUpload(inputId, cardId, nameId, onLoad) {
      const input  = document.getElementById(inputId);
      const card   = document.getElementById(cardId);
      const nameEl = document.getElementById(nameId);

      input.addEventListener('change', e => {
        const file = e.target.files[0];
        if (file) readFile(file, nameEl, card, onLoad);
      });
      card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) readFile(file, nameEl, card, onLoad);
      });
    }

    function readFile(file, nameEl, card, onLoad) {
      const reader = new FileReader();
      reader.onload = e => {
        nameEl.textContent = '✔ ' + file.name;
        card.classList.add('loaded');
        localStorage.setItem('scoreCSV',      e.target.result);
        localStorage.setItem('scoreCSVName',  file.name);
        onLoad(e.target.result);
        tryCalculate();
      };
      reader.readAsText(file, 'UTF-8');
    }

    setupUpload('input-score', 'card-score', 'name-score', text => {
      const { rows } = parseCSV(text);
      scoreRows = rows;
    });

    // ── タイトル正規化 ────────────────────────
    function normalizeTitle(title) {
      return title
        .trim()
        .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036\u301D\u301E\u301F\uFF02]/g, '"')
        .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035\uFF07]/g, "'")
        .replace(/\u3000/g, ' ')
        .normalize('NFC');
    }

    // 引用符を正規化（curly quote等→ASCII）
    function normalizeQuotes(s) {
      return s
        .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036\u301D\u301E\u301F\uFF02]/g, '"')
        .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035\uFF07\u02BC]/g, "'");
    }
    // strict: 記号を保持（≡+≡など記号主体タイトルに対応）
    function titleKeyStrict(title) {
      return normalizeQuotes(title.trim()).normalize('NFKD').replace(/\p{M}/gu, '').toLowerCase().replace(/\s+/g, '');
    }
    // loose: a-z/0-9/CJKのみ保持（CSV間の記号エンコーディング差異を吸収）
    // NFKDで分解されないストローク付きラテン文字はASCII相当に変換してから除去
    function titleKeyLoose(title) {
      return normalizeQuotes(title.trim()).normalize('NFKD').replace(/\p{M}/gu, '').toLowerCase()
        .replace(/[øœ]/g, 'o').replace(/ł/g, 'l').replace(/đ/g, 'd')
        .replace(/ħ/g, 'h').replace(/ŧ/g, 't').replace(/ŋ/g, 'n')
        .replace(/[^a-z0-9\p{Script=Hiragana}\p{Script=Katakana}\p{Script=Han}]/gu, '');
    }
    function titleKey(title) { return titleKeyStrict(title); }

    // ── CSV パース ───────────────────────────
    function parseCSV(text) {
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      const lines = text.trim().split(/\r?\n/);
      const headers = splitLine(lines[0]);
      const rows = lines.slice(1).map(l => {
        const cells = splitLine(l);
        const obj = {};
        headers.forEach((h, i) => obj[h] = (cells[i] || '').trim());
        return obj;
      });
      return { headers, rows };
    }

    function splitLine(line) {
      const result = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; } // エスケープ済み ""
          else if (inQ) { inQ = false; }                      // 閉じクォート
          else if (cur === '') { inQ = true; }                // フィールド先頭の開きクォート
          else { cur += c; }                                  // 非クォートフィールド内のリテラル "
        } else if (c === ',' && !inQ) {
          result.push(cur); cur = '';
        } else {
          cur += c;
        }
      }
      result.push(cur);
      return result;
    }

    // ── 計算 ─────────────────────────────────
    function tryCalculate() {
      if (!scoreRows || Object.keys(radarMapByType).length === 0) return;
      hideError();

      resultsByType  = {};
      unplayedByType = {};

      // レベルマップをスコアCSVから構築 (titleKeyLoose::diffAbbr → level)
      const levelMap = new Map();
      // スコアCSVのプレイ済みlooseセット（radar未マッチでも判定に使う）
      const scoreLoosePlayedSet = new Set();
      for (const row of scoreRows) {
        const rawTitle = (row['タイトル'] || '').trim();
        if (!rawTitle) continue;
        const tk = titleKeyLoose(rawTitle);
        for (const diff of DIFF_MAP) {
          const level     = row[`${diff.full} 難易度`] || '';
          const clearType = (row[`${diff.full} クリアタイプ`] || '').trim();
          const score     = parseInt(row[`${diff.full} スコア`]);
          if (level) levelMap.set(`${tk}::${diff.abbr}`, level);
          if (clearType !== 'NO PLAY' && clearType !== '' && !isNaN(score) && score > 0) {
            scoreLoosePlayedSet.add(`${tk}::${diff.abbr}`);
          }
        }
      }

      // 第1パス: resultsByType を構築 (strict→looseの順でフォールバック)
      for (const type of RADAR_TYPES) {
        const maps = radarMapByType[type];
        if (!maps || maps.strict.size === 0) continue;
        const results = [];
        for (const row of scoreRows) {
          const rawTitle = (row['タイトル'] || '').trim();
          if (!rawTitle) continue;
          for (const diff of DIFF_MAP) {
            const clearType = (row[`${diff.full} クリアタイプ`] || '').trim();
            if (clearType === 'NO PLAY' || clearType === '') continue;
            const score = parseInt(row[`${diff.full} スコア`]);
            if (isNaN(score) || score <= 0) continue;
            const level = row[`${diff.full} 難易度`] || '';
            const radar = maps.strict.get(`${titleKeyStrict(rawTitle)}::${diff.abbr}`)
                       || maps.loose.get(`${titleKeyLoose(rawTitle)}::${diff.abbr}`)
                       || (() => {
                         const extras = TITLE_LOOKUP_EXTRA.get(rawTitle);
                         if (!extras) return undefined;
                         for (const alt of extras) {
                           const r = maps.strict.get(`${titleKeyStrict(alt)}::${diff.abbr}`)
                                  || maps.loose.get(`${titleKeyLoose(alt)}::${diff.abbr}`);
                           if (r) return r;
                         }
                       })();
            if (!radar || radar.notes <= 0) continue;
            const maxEx      = radar.notes * 2;
            const rate       = score / maxEx;
            const radarValue = rate * radar.max;
            results.push({ title: rawTitle, diffFull: diff.full, diffAbbr: diff.abbr, level, score, rate, radarValue, maxEx, radarMax: radar.max });
          }
        }
        results.sort((a, b) => b.radarValue - a.radarValue);
        resultsByType[type] = results;
      }

      // 第2パス: unplayedByType を構築
      for (const type of RADAR_TYPES) {
        const maps = radarMapByType[type];
        if (!maps || maps.strict.size === 0) continue;

        // strict played: マッチング済み results から
        const strictPlayedSet = new Set(
          (resultsByType[type] || []).map(r => `${titleKeyStrict(r.title)}::${r.diffAbbr}`)
        );

        const unplayed = [];
        for (const [strictKey, radar] of maps.strict) {
          const sepIdx   = strictKey.lastIndexOf('::');
          const diffAbbr = strictKey.slice(sepIdx + 2);
          const looseKey = `${titleKeyLoose(radar.rawTitle)}::${diffAbbr}`;
          // strict または loose で一致すれば played とみなす
          if (strictPlayedSet.has(strictKey) || scoreLoosePlayedSet.has(looseKey)) continue;
          const diffEntry = DIFF_MAP.find(d => d.abbr === diffAbbr);
          if (!diffEntry) continue;
          if (UNPLAYED_EXCLUDE.has(radar.rawTitle)) continue;
          const level = levelMap.get(looseKey) || '';
          const maxEx = radar.notes * 2;
          unplayed.push({ title: radar.rawTitle, diffFull: diffEntry.full, diffAbbr, level, radarMax: radar.max, maxEx });
        }

        unplayed.sort((a, b) => b.radarMax - a.radarMax);
        unplayedByType[type] = unplayed;
      }

      if (Object.keys(resultsByType).length === 0) {
        showError('データを算出できませんでした。タイトルが一致しているか確認してください。');
        return;
      }

      document.getElementById('result-section').classList.remove('hidden');
      renderCurrentTab();
    }

    // ── DJ LEVEL 算出 ────────────────────────
    const DJ_LEVEL_ORDER = ['MAX', 'MAX-', 'AAA', 'AA', 'A', 'B', 'C', 'D', 'E', 'F'];
    function oneLevelBelow(name) {
      const idx = DJ_LEVEL_ORDER.indexOf(name);
      return idx >= 0 && idx < DJ_LEVEL_ORDER.length - 1 ? DJ_LEVEL_ORDER[idx + 1] : 'F';
    }

    const DJ_LEVELS = [
      { name: 'AAA', frac: 8 },
      { name: 'AA',  frac: 7 },
      { name: 'A',   frac: 6 },
      { name: 'B',   frac: 5 },
      { name: 'C',   frac: 4 },
      { name: 'D',   frac: 3 },
      { name: 'E',   frac: 2 },
    ];

    function getDJLevelInfo(score, maxEx) {
      const aaaValue = Math.ceil(maxEx * 8 / 9);
      const maxMinus = Math.ceil((aaaValue + maxEx) / 2);
      const allThresholds = [
        { name: 'MAX',  value: maxEx },
        { name: 'MAX-', value: maxMinus },
        ...DJ_LEVELS.map(l => ({ name: l.name, value: Math.ceil(maxEx * l.frac / 9) })),
      ];

      // 現在のDJレベルを確定
      let currentLevel = 'F';
      for (const t of allThresholds) {
        if (score >= t.value) { currentLevel = t.name; break; }
      }

      // MAX- ゾーン: 表示は常に MAX(満点) からの距離 (MAX-X)
      if (currentLevel === 'MAX-') {
        return { level: 'MAX-', nearestName: 'MAX', diff: score - maxEx };
      }

      // MAX(満点): 差分0
      if (currentLevel === 'MAX') {
        return { level: 'MAX', nearestName: 'MAX', diff: 0 };
      }

      // MAX/MAX- は到達済みの場合のみ最近傍候補に含める
      const candidates = allThresholds.filter(t => {
        if (t.name === 'MAX'  && score < maxEx)    return false;
        if (t.name === 'MAX-' && score < maxMinus) return false;
        return true;
      });

      let nearest = candidates[candidates.length - 1];
      let nearestDist = Infinity;
      for (const t of candidates) {
        const dist = Math.abs(score - t.value);
        if (dist < nearestDist) { nearestDist = dist; nearest = t; }
      }

      const diff = score - nearest.value;
      return { level: currentLevel, nearestName: nearest.name, diff };
    }

    // ── ビューモード切替 ─────────────────────
    function switchView(mode) {
      viewMode = mode;
      document.getElementById('view-tab-played').classList.toggle('active',   mode === 'played');
      document.getElementById('view-tab-unplayed').classList.toggle('active', mode === 'unplayed');
      renderCurrentTab();
    }

    // ── 描画 ─────────────────────────────────
    function renderCurrentTab() {
      if (viewMode === 'unplayed') { renderUnplayedTab(); return; }

      const results = resultsByType[activeTab];
      if (!results) return;

      document.getElementById('thead').innerHTML = `<tr>
        <th style="width:40px">#</th>
        <th class="left">タイトル</th>
        <th>難易度</th><th>☆</th>
        <th>EXスコア</th><th>スコアレート</th><th>レーダー値</th>
      </tr>`;
      document.getElementById('avg-value').style.display = '';

      const top20 = results.slice(0, 20);
      const top10threshold = results.length >= 10 ? results[9].radarValue : null;
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = top20.map((r, i) => {
        const rank = i + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        const dimClass = rank > 10 ? ' out-of-top10' : '';

        let guidanceHtml = '';
        if (rank > 10 && top10threshold !== null) {
          const targetScore = Math.floor(top10threshold * r.maxEx / r.radarMax) + 1;
          const pointsNeeded = targetScore - r.score;
          if (pointsNeeded > 0 && targetScore <= r.maxEx) {
            const { nearestName, diff } = getDJLevelInfo(targetScore, r.maxEx);
            const sign = (diff >= 0 && nearestName !== 'MAX-') ? '+' : '';
            const colorLevel = (diff < 0 && nearestName !== 'MAX-' && nearestName !== 'MAX') ? oneLevelBelow(nearestName) : nearestName;
            guidanceHtml = `<br><span style="color:#e2e8f0;font-size:11px;">あと<strong>${pointsNeeded.toLocaleString()}点</strong><span class="dj-info dj-${colorLevel}">(${nearestName}${sign}${diff})</span>以上でTOP10入り</span>`;
          }
        }

        return `<tr class="${rankClass}${dimClass}" data-row-key="${escHtml(r.title + '::' + r.diffAbbr)}">
          <td class="rank center">${medal}</td>
          <td class="title" title="${escHtml(displayTitle(r.title))}">${escHtml(displayTitle(r.title))}</td>
          <td class="center"><span class="badge badge-${r.diffAbbr}">${r.diffFull}</span></td>
          <td class="center">${(r.level && r.level !== '0') ? '☆' + r.level : '—'}</td>
          <td class="right">${(() => {
            const { level, nearestName, diff } = getDJLevelInfo(r.score, r.maxEx);
            const sign = (diff >= 0 && nearestName !== 'MAX-') ? '+' : '';
            const colorLevel = (diff < 0 && nearestName !== 'MAX-' && nearestName !== 'MAX')
              ? oneLevelBelow(nearestName) : nearestName;
            return `${r.score.toLocaleString()}<br><span class="dj-info dj-${colorLevel}">(${nearestName}${sign}${diff})</span>`;
          })()}</td>
          <td class="right">${(r.rate * 100).toFixed(2)}%</td>
          <td class="radar">${(Math.floor(r.radarValue * 100) / 100).toFixed(2)}${guidanceHtml}</td>
        </tr>`;
      }).join('');
      applySelectedRows();

      document.getElementById('info-text').textContent =
        `${activeTab} — 算出対象: ${results.length.toLocaleString()} 件 → 上位 20 件表示`;

      const top10 = results.slice(0, 10);
      const avg = top10.length > 0
        ? top10.reduce((s, r) => s + Math.floor(r.radarValue * 100) / 100, 0) / top10.length
        : 0;
      document.getElementById('avg-value').textContent =
        'Total：' + (Math.floor(avg * 100) / 100).toFixed(2);
    }

    function renderUnplayedTab() {
      const unplayed = unplayedByType[activeTab];
      if (!unplayed) return;

      document.getElementById('thead').innerHTML = `<tr>
        <th style="width:40px">#</th>
        <th class="left">タイトル</th>
        <th>難易度</th><th>☆</th>
        <th>MAXレーダー値</th>
      </tr>`;
      document.getElementById('avg-value').style.display = 'none';

      const top10played    = resultsByType[activeTab] || [];
      const top10threshold = top10played.length >= 10 ? top10played[9].radarValue : null;
      const top10 = unplayed.slice(0, 10);

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = top10.map((r, i) => {
        const rank      = i + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const medal     = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;

        let guidanceHtml = '';
        if (top10threshold !== null) {
          const targetScore  = Math.floor(top10threshold * r.maxEx / r.radarMax) + 1;
          if (targetScore <= r.maxEx) {
            const { nearestName, diff } = getDJLevelInfo(targetScore, r.maxEx);
            const sign = (diff >= 0 && nearestName !== 'MAX-') ? '+' : '';
            const colorLevel = (diff < 0 && nearestName !== 'MAX-' && nearestName !== 'MAX') ? oneLevelBelow(nearestName) : nearestName;
            guidanceHtml = `<br><span style="color:#e2e8f0;font-size:11px;"><span class="dj-info dj-${colorLevel}">${nearestName}${sign}${diff}</span>以上でTOP10入り</span>`;
          }
        }

        return `<tr class="${rankClass}" data-row-key="${escHtml(r.title + '::' + r.diffAbbr)}">
          <td class="rank center">${medal}</td>
          <td class="title" title="${escHtml(displayTitle(r.title))}">${escHtml(displayTitle(r.title))}</td>
          <td class="center"><span class="badge badge-${r.diffAbbr}">${r.diffFull}</span></td>
          <td class="center">${(r.level && r.level !== '0') ? '☆' + r.level : r.level === '0' ? '譜面未解禁' : '楽曲未プレイ'}</td>
          <td class="radar">${(Math.floor(r.radarMax * 100) / 100).toFixed(2)}${guidanceHtml}</td>
        </tr>`;
      }).join('');
      applySelectedRows();

      document.getElementById('info-text').textContent =
        `${activeTab} — 未プレイ: ${unplayed.length.toLocaleString()} 件 → 上位 10 件表示`;
    }

    // ── 行選択（タップ/クリックでトグル・localStorage永続化）────────────────
    const SELECTED_KEY = 'nrv_selected_rows';
    let selectedRows = new Set(JSON.parse(localStorage.getItem(SELECTED_KEY) || '[]'));

    function saveSelectedRows() {
      localStorage.setItem(SELECTED_KEY, JSON.stringify([...selectedRows]));
    }
    function applySelectedRows() {
      document.querySelectorAll('#tbody tr[data-row-key]').forEach(tr => {
        tr.classList.toggle('selected', selectedRows.has(tr.dataset.rowKey));
      });
    }

    document.getElementById('clear-selection-btn').addEventListener('click', () => {
      selectedRows.clear();
      saveSelectedRows();
      applySelectedRows();
    });

    document.getElementById('tbody').addEventListener('click', e => {
      const tr = e.target.closest('tr[data-row-key]');
      if (!tr) return;
      const key = tr.dataset.rowKey;
      if (selectedRows.has(key)) selectedRows.delete(key);
      else selectedRows.add(key);
      tr.classList.toggle('selected', selectedRows.has(key));
      saveSelectedRows();
    });

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-area').classList.remove('hidden');
      document.getElementById('result-section').classList.add('hidden');
    }
    function hideError() {
      document.getElementById('error-area').classList.add('hidden');
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // キャッシュからスコアデータを復元
    const cachedCSV  = localStorage.getItem('scoreCSV');
    const cachedName = localStorage.getItem('scoreCSVName');
    if (cachedCSV) {
      const { rows } = parseCSV(cachedCSV);
      scoreRows = rows;
      const nameEl = document.getElementById('name-score');
      const card   = document.getElementById('card-score');
      nameEl.textContent = '✔ ' + cachedName + '（キャッシュ）';
      card.classList.add('loaded');
    }

    fetchRadarData();
  </script>
</body>
</html>
